apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-bgp
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
  - name: "K8S-NODES"
    localASN: 65001
    localPort: 179
    peers:
    - name: "FRRouter"
      peerASN: 65000
      peerAddress: 192.168.10.1
      peerConfigRef:
        name: "cilium-peer"
